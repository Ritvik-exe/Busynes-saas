<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Verify Account - Busynes</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=1" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <!-- Load AWS Cognito Identity SDK from CDN -->
    <script src="https://rawgit.com/aws/amazon-cognito-identity-js/master/dist/amazon-cognito-identity.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#F8FAFC",
                        "surface-dim": "#CBD5E1",
                        "surface-bright": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#F1F5F9",
                        "surface-container": "#E2E8F0",
                        "surface-container-high": "#CBD5E1",
                        "surface-container-highest": "#94A3B8",
                        "on-surface": "#0F172A",
                        "on-surface-variant": "#475569",
                        "inverse-surface": "#1E293B",
                        "inverse-on-surface": "#F8FAFC",
                        "outline": "#94A3B8",
                        "outline-variant": "#E2E8F0",
                        "surface-tint": "#187c13",
                        "primary": "#187c13",
                        "on-primary": "#ffffff",
                        "primary-container": "#187c13",
                        "on-primary-container": "#ffffff",
                        "inverse-primary": "#41bc3a",
                        "secondary": "#475569",
                        "on-secondary": "#ffffff",
                        "secondary-container": "rgba(24, 124, 19, 0.1)",
                        "on-secondary-container": "#187c13",
                        "tertiary": "#64748B",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#E2E8F0",
                        "on-tertiary-container": "#0F172A",
                        "error": "#EF4444",
                        "on-error": "#ffffff",
                        "error-container": "#FEE2E2",
                        "on-error-container": "#991B1B",
                        "background": "#F8FAFC",
                        "on-background": "#0F172A",
                        "surface-variant": "#E2E8F0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-background font-body-md h-screen flex items-center justify-center p-4">
    <div
        class="w-full max-w-md bg-surface-container-lowest p-8 rounded-2xl border border-outline-variant shadow-lg flex flex-col gap-6">
        <!-- Logo and Heading -->
        <div class="text-center">
            <div class="flex justify-center items-center gap-3 mb-2">
                <img alt="Busynes Logo" class="h-8 w-auto"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaglyYYHQQHhZI0sXOTcaVVDVGSJuZXRoKofma9kTZsHLG0WS23LRWQF6QP0mNzpRm1_dYjnYgl4vAS3G_xMrnF2LHiqNvSIDgpIkQN7hsYsN4spBArqw8Q5r_sTBUc0_V10OyF_L9R10Bik18Mr2hR3P87XxQVxm4dfg5doaByVE6wQzLZ4zjrLwedRQPmnXaxynT_LhkMqPQxFKlzAO4RoWw0XrNs7545LYLvhi3yQdUuFg71vULTx9CmUpE-YPYT9VcrQGq4zc">
                <span class="font-headline-md text-2xl font-bold text-primary tracking-tight">Busynes</span>
            </div>
            <h2 class="text-xl font-bold text-on-surface">Verify Your Account</h2>
            <p class="text-xs text-on-surface-variant mt-1" id="verification-notice">
                We sent a 6-digit confirmation code to your email. Enter it below to complete registration.
            </p>
        </div>

        <!-- Alert Notification Panel -->
        <div id="alert-panel" class="hidden p-4 rounded-xl border flex items-start gap-3">
            <span id="alert-icon" class="material-symbols-outlined text-lg">error</span>
            <div class="flex-1">
                <p id="alert-message" class="text-xs font-semibold">Error message goes here</p>
            </div>
        </div>

        <!-- Verification Form -->
        <form id="verification-form" class="flex flex-col gap-4">
            <div>
                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2"
                    for="verification-code">
                    6-Digit Code
                </label>
                <input id="verification-code" type="text" maxlength="6" autocomplete="off" required
                    class="w-full bg-surface border border-outline-variant rounded-lg p-3 text-center font-mono text-xl tracking-widest focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                    placeholder="000000">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-primary text-white py-3 rounded-full font-bold hover:bg-primary-container transition-all flex items-center justify-center gap-2 cursor-pointer">
                <span>Confirm Account</span>
            </button>
        </form>

        <!-- Footer options -->
        <div class="text-center pt-4 border-t border-outline-variant/30 flex flex-col gap-2">
            <button onclick="resendCode()" class="text-xs text-primary font-semibold hover:underline cursor-pointer">
                Didn't receive a code? Resend Code
            </button>
            <a href="signup.html" class="text-xs text-on-surface-variant hover:underline mt-1">
                Back to Sign Up
            </a>
        </div>
    </div>

    <script>
        // CONFIGURATION: Replace these values with your exact AWS Cognito Pool IDs
        const POOL_DATA = {
            UserPoolId: 'eu-west-2_oJdCgUuI4', // Your exact Cognito User Pool ID
            ClientId: '3vvep20pksv75is4b0kicqdtor'   // Your exact Cognito App Client ID
        };

        const userPool = new AmazonCognitoIdentity.CognitoUserPool(POOL_DATA);
        const signupEmail = sessionStorage.getItem('busynes_signup_email') || '';

        // Display targeted email in notice
        document.addEventListener('DOMContentLoaded', () => {
            if (signupEmail) {
                document.getElementById('verification-notice').innerHTML = `We sent a 6-digit confirmation code to <strong class="text-on-surface">${signupEmail}</strong>. Enter it below to complete registration.`;
            }
        });

        // Form Submit Handler
        document.getElementById('verification-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const codeInput = document.getElementById('verification-code');
            const code = codeInput.value.trim();
            const submitBtn = document.getElementById('submit-btn');

            if (code.length !== 6) {
                showAlert("Please enter a valid 6-digit code.", true);
                return;
            }

            if (!signupEmail) {
                showAlert("No active registration email found. Please sign up again.", true);
                return;
            }

            // Set Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>Verifying...</span>`;
            hideAlert();

            const userData = {
                Username: signupEmail,
                Pool: userPool
            };

            const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

            cognitoUser.confirmRegistration(code, true, (err, result) => {
                if (err) {
                    console.error("Verification failed:", err);
                    showAlert(err.message || "Invalid verification code.", true);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span>Confirm Account</span>`;
                    return;
                }

                // Success
                showAlert("Account verified successfully! Redirecting to login...", false);
                sessionStorage.removeItem('busynes_signup_email');
                setTimeout(() => {
                    window.location.href = "signup.html";
                }, 2000);
            });
        });

        // Resend Verification Code
        function resendCode() {
            if (!signupEmail) {
                showAlert("No email address found to resend code.", true);
                return;
            }

            hideAlert();
            const userData = {
                Username: signupEmail,
                Pool: userPool
            };

            const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

            cognitoUser.resendConfirmationCode((err, result) => {
                if (err) {
                    console.error("Resend failed:", err);
                    showAlert(err.message || "Failed to resend confirmation code.", true);
                    return;
                }
                showAlert("A fresh verification code has been sent to your inbox!", false);
            });
        }

        // Show/Hide Alert Banner helper
        function showAlert(message, isError = true) {
            const panel = document.getElementById('alert-panel');
            const icon = document.getElementById('alert-icon');
            const msgText = document.getElementById('alert-message');

            msgText.textContent = message;
            panel.classList.remove('hidden');

            if (isError) {
                panel.className = "p-4 rounded-xl border bg-error-container border-error/20 text-on-error-container flex items-start gap-3";
                icon.textContent = "error";
            } else {
                panel.className = "p-4 rounded-xl border bg-emerald-50 text-emerald-800 border-emerald-500/20 flex items-start gap-3";
                icon.textContent = "check_circle";
            }
        }

        function hideAlert() {
            document.getElementById('alert-panel').classList.add('hidden');
        }
    </script>
</body>

</html>
